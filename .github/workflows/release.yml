name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-portable:
    name: "Package ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: wireviz-studio-windows
          - os: macos-latest
            artifact_name: wireviz-studio-macos
          - os: ubuntu-latest
            artifact_name: wireviz-studio-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Linux Graphviz
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install macOS Graphviz
        if: runner.os == 'macOS'
        run: brew install graphviz

      - name: Install Windows Graphviz
        if: runner.os == 'Windows'
        run: choco install graphviz --yes

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[gui]"
          python -m pip install pyinstaller==6.16.0

      - name: Build portable package
        run: python packaging/build_portable.py --build-type portable --clean --version "${{ github.ref_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-portable
          path: dist-artifacts/**
          if-no-files-found: error

  package-native:
    name: "Native ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows-installer
            artifact_name: wireviz-studio-windows-native
          - os: macos-latest
            target: macos-dmg
            artifact_name: wireviz-studio-macos-native
          - os: ubuntu-latest
            target: linux-appimage
            artifact_name: wireviz-studio-linux-native

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Linux Graphviz
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install macOS Graphviz
        if: runner.os == 'macOS'
        run: brew install graphviz

      - name: Install Windows Graphviz
        if: runner.os == 'Windows'
        run: choco install graphviz --yes

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[gui]"
          python -m pip install pyinstaller==6.16.0

      - name: Install NSIS (Windows)
        if: matrix.target == 'windows-installer'
        shell: pwsh
        run: |
          choco install nsis.install --yes --no-progress
          where.exe makensis || $true

      - name: Add NSIS to PATH (Windows)
        if: matrix.target == 'windows-installer'
        shell: pwsh
        run: |
          $existing = Get-Command makensis -ErrorAction SilentlyContinue
          if ($existing) {
            $resolved = Split-Path -Path $existing.Source -Parent
            Add-Content -Path $env:GITHUB_PATH -Value $resolved
            Write-Host "Found makensis at: $($existing.Source)"
            & $existing.Source /VERSION
            exit 0
          }

          $candidateDirs = @(
            "${env:ProgramFiles(x86)}\NSIS",
            "${env:ProgramW6432}\NSIS",
            "${env:ProgramFiles}\NSIS",
            "C:\ProgramData\chocolatey\bin"
          )
          $nsisDir = $null
          foreach ($dir in $candidateDirs) {
            if ($dir -and (Test-Path (Join-Path $dir 'makensis.exe'))) {
              $nsisDir = $dir
              break
            }
          }

          if (-not $nsisDir) {
            throw 'makensis.exe not found after NSIS installation'
          }

          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir
          Write-Host "Using NSIS directory: $nsisDir"
          where.exe makensis || $true
          & (Join-Path $nsisDir 'makensis.exe') /VERSION

      - name: Install AppImage tool (Linux)
        if: matrix.target == 'linux-appimage'
        run: |
          curl -L -o appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

      - name: Setup Apple notarization profile (macOS)
        if: matrix.target == 'macos-dmg'
        shell: bash
        run: |
          if [[ -z "${APPLE_NOTARY_KEY_ID:-}" || -z "${APPLE_NOTARY_ISSUER_ID:-}" || -z "${APPLE_NOTARY_PRIVATE_KEY_BASE64:-}" ]]; then
            echo "Apple notary env vars not set; skipping notarization profile setup."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$APPLE_NOTARY_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          xcrun notarytool store-credentials "wirevizstudio-notary" \
            --key "$RUNNER_TEMP/notary/AuthKey_${APPLE_NOTARY_KEY_ID}.p8" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"

      - name: Build native package
        env:
          APPIMAGETOOL: ${{ github.workspace }}/appimagetool.AppImage
          APPLE_NOTARY_PROFILE: wirevizstudio-notary
          WINDOWS_TIMESTAMP_URL: http://timestamp.digicert.com
        run: python packaging/build_native.py --target ${{ matrix.target }} --clean --version "${{ github.ref_name }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-artifacts/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [package-portable, package-native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
