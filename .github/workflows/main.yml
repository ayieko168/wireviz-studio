name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install macOS Graphviz
        if: runner.os == 'macOS'
        run: brew install graphviz

      - name: Install Windows Graphviz
        if: runner.os == 'Windows'
        run: choco install graphviz --yes

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,gui]"

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Core tests with coverage
        run: python -m pytest tests/core --cov=src/wireviz_studio --cov-report=term-missing --cov-fail-under=30
        
